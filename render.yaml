services:
  - type: web
    name: global-history-lens
    runtime: node
    plan: free
    buildCommand: NPM_CONFIG_CACHE=.npm-cache npx -y pnpm@10.4.1 install --frozen-lockfile --prod=false && NPM_CONFIG_CACHE=.npm-cache npx -y pnpm@10.4.1 build
    startCommand: NODE_ENV=production node dist/index.js
